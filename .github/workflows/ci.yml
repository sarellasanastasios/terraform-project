name: CI - Build and Push to ACR

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions: 
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build Docker Image
        run: |
          docker build -t terraform-app:${{ github.sha }} -f app/Dockerfile app

      - name: Login to ACR
        run: |
          az acr login --name ${{ vars.ACR_NAME }}

      - name: Tag image
        run: |
          docker tag terraform-app:${{ github.sha }} ${{ vars.ACR_NAME }}.azurecr.io/terraform-app:${{ github.sha }}


      - name: Push image
        run: |
         docker push ${{ vars.ACR_NAME }}.azurecr.io/terraform-app:${{ github.sha }}
        
            
          
          
          
  

  
  
